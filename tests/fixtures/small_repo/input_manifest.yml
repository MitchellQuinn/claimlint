version: 0.1

include:
  - path: README.md
    role: primary_readme
  - glob: docs/**/*.md
    role: documentation
  - glob: metrics/**/*.json
    role: metrics
  - glob: configs/**/*.yml
    role: config

exclude:
  - glob: .git/**
  - glob: .venv/**
  - glob: node_modules/**
  - glob: runs/**
  - glob: dist/**
  - glob: build/**

limits:
  max_file_bytes: 500000
  max_total_files: 200

