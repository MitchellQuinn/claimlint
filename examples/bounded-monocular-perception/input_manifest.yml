version: 0.1

include:
  - path: README.md
    role: primary_readme

  - glob: docs/**/*.md
    role: documentation

  - glob: reports/**/*.md
    role: technical_report

  - glob: incidents/**/*.md
    role: incident_report

  - glob: metrics/**/*.json
    role: metrics

  - glob: configs/**/*.yml
    role: config

exclude:
  - glob: .git/**
  - glob: .venv/**
  - glob: node_modules/**
  - glob: output/**
  - glob: dist/**
  - glob: build/**

limits:
  max_file_bytes: 500000
  max_total_files: 200
