version: 0.1

include:
  - path: docs/environment.md
    role: environment_notes
    source_role: reference_only
    extract_claims: false
    use_as_evidence: true

  - path: docs/implementation_map.md
    role: implementation_map
    source_role: reference_only
    extract_claims: false
    use_as_evidence: true

  - path: examples/claimlint-self-audit/smoke_test.md
    role: smoke_test
    source_role: reference_only
    extract_claims: false
    use_as_evidence: true

  - path: examples/claimlint-self-audit/claimlint-github-manifest.yml
    role: self_audit_config
    source_role: reference_only
    extract_claims: false
    use_as_evidence: true

  - path: README.md
    role: primary_readme
    source_role: claim_source
    extract_claims: true
    use_as_evidence: true

  - path: docs/architecture.md
    role: architecture_documentation
    source_role: claim_source
    extract_claims: true
    use_as_evidence: true

  - path: workflows/claim_audit.yml
    role: workflow_contract
    source_role: workflow_contract
    extract_claims: false
    use_as_evidence: true

  - path: docs/runtime_contract.md
    role: runtime_contract
    source_role: runtime_contract
    extract_claims: false
    use_as_evidence: true

  - path: docs/manifest_contract.md
    role: runtime_contract
    source_role: runtime_contract
    extract_claims: false
    use_as_evidence: true

  - path: docs/workflow_contract.md
    role: workflow_contract
    source_role: workflow_contract
    extract_claims: false
    use_as_evidence: true

  - path: docs/adapter_contract.md
    role: adapter_contract
    source_role: adapter_contract
    extract_claims: false
    use_as_evidence: true

  - path: docs/claim_taxonomy.md
    role: reference
    source_role: reference_only
    extract_claims: false
    use_as_evidence: true

  - path: docs/verdict_rules.md
    role: reference
    source_role: reference_only
    extract_claims: false
    use_as_evidence: true

  - path: pyproject.toml
    role: project_config
    source_role: reference_only
    extract_claims: false
    use_as_evidence: true

  - glob: src/claimlint/*.py
    role: source_code
    source_role: source_code
    extract_claims: false
    use_as_evidence: true

  - glob: tests/*.py
    role: smoke_test
    source_role: test_fixture
    extract_claims: false
    use_as_evidence: true

  - glob: schemas/*.json
    role: schema_reference
    source_role: schema_reference
    extract_claims: false
    use_as_evidence: true

  - path: adapters/status.yml
    role: adapter_status
    source_role: adapter_contract
    extract_claims: false
    use_as_evidence: true

  - glob: adapters/*/README.md
    role: adapter_documentation
    source_role: adapter_contract
    extract_claims: false
    use_as_evidence: true

exclude:
  - glob: .git/**
  - glob: .venv/**
  - glob: .pytest_cache/**
  - glob: node_modules/**
  - glob: output/**
  - glob: dist/**
  - glob: build/**

limits:
  max_file_bytes: 500000
  max_total_files: 200
